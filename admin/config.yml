backend:
  name: git-gateway
  branch: main

media_folder: "assets/images"
public_folder: "/assets/images"

collections:
  - name: "site_data"
    label: "Projects & Portfolio"
    files:
      - file: "content/portfolio.json"
        label: "All Portfolio Items"
        name: "projects_list"
        fields:
          - label: "Projects List"
            name: "projects"
            widget: "list"
            fields:
              - {label: "Project Title", name: "title", widget: "string"}
              - {label: "Category", name: "category", widget: "select", options: ["YouTube Editing", "Shorts & Reels", "Gaming Montages", "Motion Graphics", "Color Grading"], default: "Shorts & Reels"}
              - {label: "Video URL / Shorts Link", name: "video_url", widget: "string"}
              - {label: "Custom Thumbnail Image (Optional)", name: "thumbnail", widget: "image", required: false}
              - {label: "Description (Optional)", name: "description", widget: "text", required: false}
